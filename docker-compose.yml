# ============================================
# EducAgent Docker Compose Configuration
# ============================================
# This file provides orchestration for EducAgent services
#
# Usage:
#   Production:  docker compose up -d
#   Development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Build only:  docker compose build
#
# Prerequisites:
#   1. Copy .env.example to .env and configure your API keys
#   2. Optionally customize config/main.yaml and config/agents.yaml
# ============================================

services:
  postgres:
    image: postgres:16
    container_name: educagent-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-educagent}
      - POSTGRES_USER=${POSTGRES_USER:-educagent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-educagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-educagent} -d ${POSTGRES_DB:-educagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - educagent-network

  postgres-test:
    image: postgres:16
    container_name: educagent-postgres-test
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_TEST_DB:-educagent_test}
      - POSTGRES_USER=${POSTGRES_TEST_USER:-educagent}
      - POSTGRES_PASSWORD=${POSTGRES_TEST_PASSWORD:-educagent}
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_TEST_USER:-educagent} -d ${POSTGRES_TEST_DB:-educagent_test}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - educagent-network

  # ============================================
  # All-in-One EducAgent Service
  # ============================================
  educagent:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        # Pass backend port at build time for Next.js static optimization
        - BACKEND_PORT=${BACKEND_PORT:-8001}
    container_name: educagent
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
      - "${FRONTEND_PORT:-3782}:${FRONTEND_PORT:-3782}"

    # Load environment variables from .env file
    env_file:
      - .env

    environment:
      # LLM Configuration (Required)
      - LLM_BINDING=${LLM_BINDING:-openai}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_HOST=${LLM_HOST}
      - DISABLE_SSL_VERIFY=${DISABLE_SSL_VERIFY:-false}
      # Embedding Configuration (Required for Knowledge Base)
      - EMBEDDING_BINDING=${EMBEDDING_BINDING:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_HOST=${EMBEDDING_HOST}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-3072}
      - EMBEDDING_MAX_TOKENS=${EMBEDDING_MAX_TOKENS:-8192}
      # TTS Configuration (Optional)
      - TTS_MODEL=${TTS_MODEL:-}
      - TTS_API_KEY=${TTS_API_KEY:-}
      - TTS_URL=${TTS_URL:-}
      - TTS_VOICE=${TTS_VOICE:-alloy}
      # Web Search Configuration (Optional)
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-perplexity}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      # Logging: Configure in config/main.yaml -> logging.level
      # ============================================
      # Service Ports Configuration
      # ============================================
      # Backend API port (default: 8001)
      - BACKEND_PORT=${BACKEND_PORT:-8001}
      # Frontend web port (default: 3782)
      - FRONTEND_PORT=${FRONTEND_PORT:-3782}
      # ============================================
      # API URL Configuration (Important for Cloud Deployment)
      # ============================================
      # For CLOUD/REMOTE deployment: Set this to your server's public URL
      # Example: https://your-server.com:8001 or https://api.yourdomain.com
      # If not set, defaults to http://localhost:${BACKEND_PORT} (only works locally)
      - NEXT_PUBLIC_API_BASE_EXTERNAL=${NEXT_PUBLIC_API_BASE_EXTERNAL:-}
      # Alternative: Direct API base URL (same priority as NEXT_PUBLIC_API_BASE_EXTERNAL)
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-}
      # Auth + DB configuration
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://educagent:educagent@postgres:5432/educagent}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required. Set a 32+ character JWT signing secret in .env.}
      - AUTH_ALGORITHM=${AUTH_ALGORITHM:-HS256}
      - AUTH_TOKEN_LIFETIME_SECONDS=${AUTH_TOKEN_LIFETIME_SECONDS:-3600}
      # Optional escape hatch for local/dev debugging only.
      # Default behavior is fail-closed when Alembic migrations fail.
      - ALLOW_MIGRATION_FAILURE=${ALLOW_MIGRATION_FAILURE:-false}

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      # Mount local config directory (read-only)
      - ./config:/app/config:ro
      # Mount local data directory for persistence (read-write)
      # This ensures all outputs go to your local ./data directory
      - ./data/user:/app/data/user
      - ./data/knowledge_bases:/app/data/knowledge_bases

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - educagent-network

# ============================================
# Networks
# ============================================
networks:
  educagent-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_test_data:
