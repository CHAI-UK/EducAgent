## LLM config for passive_course_agent ContentGenerator pipeline.
## Decoupled from code — edit this file to change models/params without touching Python.

# OpenRouter connection
api_key_env: OPENROUTER_API_KEY          # env var name (fallback: LLM_API_KEY)
base_url_env: OPENROUTER_BASE_URL        # env var name
base_url_default: https://openrouter.ai/api/v1
request_timeout_s: 300
heartbeat_interval_s: 15
max_wait_s: 360

# Phase 1: Outline generation
outline:
  model: anthropic/claude-sonnet-4.6
  temperature: 0.4
  max_tokens: 2048

# Phase 2: Content generation (per section)
content:
  model: anthropic/claude-sonnet-4.6
  temperature: 0.5
  max_tokens: 8192
  # Story 5.3 AC-14: at most N concurrent LLM calls when drafting outline
  # nodes. Default 2 — safe for paid OpenRouter with Claude Sonnet. Set to 1
  # to preserve the previous serial behavior; 3-4 is typically still safe on
  # paid tier but may see 429s under burst load. Node output order is always
  # preserved regardless of concurrency.
  concurrency: 2
  # Story 5.3 AC-13: LLM calls retry on 429 / rate_limit_error with exponential
  # backoff. Delays (seconds) applied to retry attempts 1..N-1 (last attempt
  # surfaces the error). Keep total wait bounded — the primary defense is
  # bounded concurrency, not unbounded retry.
  retry_delays_s: [1, 2, 4]

# Phase 2.5: Fact-checking pass over generated content (domain critic).
# Uses a separate model so the critic doesn't share blind spots with the
# generator. Set `enabled: false` to skip the step entirely.
fact_check:
  enabled: true
  model: openai/gpt-5
  temperature: 0.0
  # Raised from 2048 on 2026-04-22: gpt-5 reasoning tokens consume part of the
  # completion budget, so the critic was routinely hitting `finish=length` at
  # 2048 and may have silently truncated issue lists. 8192 gives clear headroom
  # while still well under gpt-5's per-call ceiling.
  max_tokens: 8192
  # When a section is flagged "critical", regenerate it with the critic's
  # suggestions injected back into the content prompt. "minor" issues are
  # logged only.
  regenerate_on_critical: true
  # Cap regeneration attempts per node to avoid loops.
  max_regeneration_attempts: 1
  # Story 5.3 AC-8: if true, run ONE re-critique on a rewritten node to
  # verify the fix addressed the issue. Residual issues after the re-check
  # are logged but don't trigger another rewrite (worst-case 3 critic calls).
  # Default false to preserve previous behavior.
  targeted_recheck: false

# Phase 3: Image generation
image:
  model: openai/gpt-5.4-image-2  # primary (supports modalities: image, text)
  fallback_model: google/gemini-3.1-flash-image-preview  # backup
  # Images are generated for [CONTEXT_IMAGE: ...] and [PEDAGOGICAL_IMAGE: ...]
  # markers in content. Legacy [IMAGE: ...] markers are still accepted.
  # Story 5.3 AC-9: set enabled=false to skip image generation entirely for
  # cost-sensitive or text-only runs. Image markers stay in content as text.
  enabled: true
  # Story 5.3 AC-10: "inline" (default) keeps current graph order
  # (fact_checker -> image_generator -> cache_writer). "deferred" reorders to
  # fact_checker -> cache_writer -> image_generator, so text persists to cache
  # first and images are layered in afterward. image_generator updates the
  # cached artifact on completion when mode=deferred.
  mode: inline
  # At most N image calls in flight concurrently, governed by asyncio.Semaphore.
  # Image endpoints are slower and have tighter per-provider rate limits than
  # text — 2 is conservative and safe, 3 usually works on paid OpenRouter but
  # may see 429s under burst load. Set to 1 for previous serial behavior.
  # Filenames stay ordered by input prompt index regardless of concurrency, so
  # the first finished image is NOT necessarily img_00.
  concurrency: 3
