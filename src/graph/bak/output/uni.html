<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slipways Concept Universe (Lazy Load & Smart Search)</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  /* ── 基础与宇宙背景 ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at center, #0b101a 0%, #020408 100%);
    color: #e6edf3;
    overflow: hidden;
    height: 100vh;
    display: flex;
  }
  svg { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

  /* ── 启动屏幕 (文件上传面板) ────────────────────────────────────────── */
  #start-screen {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(10, 14, 23, 0.85); border: 1px solid rgba(88, 166, 255, 0.3);
    padding: 40px 50px; border-radius: 12px; backdrop-filter: blur(10px);
    text-align: center; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: opacity 0.5s ease;
  }
  .title-glow {
    font-size: 26px; color: #58a6ff; font-weight: 300; letter-spacing: 4px;
    margin-bottom: 12px; text-shadow: 0 0 15px rgba(88, 166, 255, 0.6);
  }
  .custom-file-upload {
    display: inline-block; padding: 12px 30px; cursor: pointer;
    background: rgba(88, 166, 255, 0.1); border: 1px solid #58a6ff;
    color: #58a6ff; border-radius: 30px; font-size: 14px; font-weight: 600;
    transition: all 0.3s; letter-spacing: 1px;
  }
  .custom-file-upload:hover { 
    background: rgba(88, 166, 255, 0.25); box-shadow: 0 0 20px rgba(88, 166, 255, 0.5); 
    color: #fff;
  }
  input[type="file"] { display: none; }

  /* ── 节点(星星) 视觉特效 ─────────────────────────────────────────────── */
  .node text {
    font-size: 12px; font-weight: 500; fill: #c9d1d9; letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(0,0,0,0.8), 0 0 15px rgba(0,0,0,1);
    pointer-events: none; opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease; transform: translateY(5px);
  }
  .node:hover text, .node.active text, .node.neighbor text { opacity: 1; transform: translateY(0); }
  .node.dimmed { opacity: 0.15; transition: opacity 0.5s; }
  .node { transition: opacity 0.5s; cursor: pointer; }

  .star-core { fill: #ffffff; transition: r 0.3s; }
  .star-halo { transition: r 0.3s, opacity 0.3s; opacity: 0.6; }
  .star-flare { stroke: #ffffff; stroke-width: 1; opacity: 0.3; transition: opacity 0.3s, stroke-width 0.3s; }
  
  .nebula-core { fill: #0b101a; stroke: rgba(88, 166, 255, 0.4); stroke-width: 1.5; stroke-dasharray: 4, 4; transition: r 0.3s; }
  .nebula-halo { fill: #1f6feb; opacity: 0.05; transition: r 0.3s, opacity 0.3s; }
  .node.active .nebula-halo { opacity: 0.2; }
  .node.active .nebula-core { stroke: #00f0ff; stroke-width: 2; box-shadow: 0 0 15px #00f0ff;}

  .node:hover .star-halo, .node.active .star-halo { opacity: 0.9; }
  .node:hover .star-flare, .node.active .star-flare { opacity: 0.8; stroke-width: 1.5; }
  
  /* ── 连线(航道/Slipways) 视觉特效 ───────────────────────────────────── */
  .link-group { opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
  .link-group.active { opacity: 1; }
  .link-base { stroke-opacity: 0.2; transition: stroke-width 0.3s; }
  
  .link-particles {
    stroke-opacity: 0.9; stroke-linecap: round;
    stroke-dasharray: 4, 30;
    animation: flowParticles 1.5s linear infinite;
  }
  @keyframes flowParticles { from { stroke-dashoffset: 34; } to { stroke-dashoffset: 0; } }

  /* ── UI 面板 ────────────────────────────────────────────────────────── */
  #hud-panel {
    position: absolute; top: 20px; left: 20px; width: 260px;
    background: rgba(10, 14, 23, 0.4); border: 1px solid rgba(88, 166, 255, 0.2);
    border-radius: 8px; backdrop-filter: blur(8px); z-index: 10;
    padding: 16px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); display: none;
  }
  .hud-title { font-size: 13px; font-weight: 700; color: #58a6ff; margin-bottom: 6px; letter-spacing: 2px; text-transform: uppercase;}
  #universe-stats { font-size: 10px; color: #39ff14; margin-bottom: 12px; font-family: monospace;}
  
  .hud-divider { height: 1px; background: rgba(88, 166, 255, 0.2); margin: 12px 0; }
  
  .filter-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 12px; cursor: pointer;}
  .filter-color { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; flex-shrink: 0;}
  
  .hud-btn {
    background: rgba(88, 166, 255, 0.1); border: 1px solid #58a6ff;
    color: #58a6ff; padding: 8px 12px; border-radius: 4px;
    font-size: 11px; font-weight: bold; cursor: pointer; width: 100%;
    text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
    margin-top: 5px;
  }
  .hud-btn:hover { background: #58a6ff; color: #fff; box-shadow: 0 0 15px rgba(88, 166, 255, 0.4);}
  .hud-btn:disabled { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); color: #888; cursor: not-allowed; box-shadow: none;}

  #search-container {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: 400px; display: none;
  }
  #search-input {
    width: 100%; padding: 12px 20px; border-radius: 30px;
    background: rgba(10, 14, 23, 0.6); border: 1px solid rgba(88, 166, 255, 0.3);
    color: white; font-size: 14px; outline: none;
    backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: all 0.3s;
  }
  #search-input:focus { border-color: #58a6ff; background: rgba(10, 14, 23, 0.9); box-shadow: 0 0 15px rgba(88, 166, 255, 0.3); }
  #dropdown {
    position: absolute; top: 55px; left: 0; width: 100%;
    background: rgba(10, 14, 23, 0.95); border: 1px solid rgba(88, 166, 255, 0.2);
    border-radius: 12px; max-height: 300px; overflow-y: auto;
    display: none; backdrop-filter: blur(10px); padding: 8px 0;
  }
  .dropdown-item { 
    padding: 10px 20px; cursor: pointer; font-size: 13px; color: #c9d1d9; 
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: rgba(88, 166, 255, 0.2); color: #fff; }
  .item-mass { font-size: 10px; color: #58a6ff; font-family: monospace; background: rgba(88, 166, 255, 0.1); padding: 2px 6px; border-radius: 4px; }

  #info-panel {
    position: absolute; top: 20px; right: 20px; width: 300px;
    background: rgba(10, 14, 23, 0.6); border: 1px solid rgba(88, 166, 255, 0.2);
    border-radius: 8px; backdrop-filter: blur(10px); z-index: 10;
    padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.4s, transform 0.4s; transform: translateX(20px);
  }
  #info-panel.show { opacity: 1; pointer-events: auto; transform: translateX(0); }
  #info-title { font-size: 20px; font-weight: 300; margin-bottom: 8px; color: #fff; letter-spacing: 1px;}
  #info-desc { font-size: 13px; color: #8b949e; line-height: 1.6; margin-bottom: 16px; max-height: 300px; overflow-y: auto;}
  .close-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #8b949e; font-size: 16px;}
  .close-btn:hover { color: #fff; }

</style>
</head>
<body>

<div id="start-screen">
  <div class="title-glow">SLIPWAYS UNIVERSE</div>
  <div style="font-size: 13px; color: #8b949e; margin-bottom: 30px;">Initialize Core Matrix (Lazy Load Enabled)</div>
  <label class="custom-file-upload">
    <input type="file" id="file-upload" accept=".json">
    LOAD GRAPH.JSON
  </label>
</div>

<div id="hud-panel">
  <div class="hud-title">Slipways Radar</div>
  <div id="universe-stats">Nodes: 0 / 0</div>
  
  <div style="font-size: 11px; color: #8b949e; margin-bottom: 8px;">Entities:</div>
  <!-- 节点类型过滤器 -->
  <label class="filter-row">
    <input type="checkbox" id="toggle-concepts" style="margin-right:10px; accent-color:#58a6ff" checked>
    <div class="filter-color" style="background:#58a6ff; box-shadow: 0 0 10px #58a6ff"></div>
    <span>Concepts (Stars)</span>
  </label>
  <label class="filter-row">
    <input type="checkbox" id="toggle-sections" style="margin-right:10px; accent-color:#1f6feb" checked>
    <div class="filter-color" style="background:transparent; border:2px dashed #1f6feb;"></div>
    <span>Sections (Nebulas)</span>
  </label>
  
  <div class="hud-divider"></div>
  <div style="font-size: 11px; color: #8b949e; margin-bottom: 8px;">Active Energy Routes:</div>
  <!-- 连线类型过滤器容器 -->
  <div id="filter-container"></div>
  
  <div class="hud-divider"></div>
  <!-- 全加载按钮 -->
  <button id="btn-load-all" class="hud-btn">Load Full Universe</button>
</div>

<div id="search-container">
  <input type="text" id="search-input" placeholder="Scan the cosmos for concepts..." autocomplete="off">
  <div id="dropdown"></div>
</div>

<div id="info-panel">
  <div class="close-btn" onclick="resetUniverse()">✕</div>
  <div id="info-title">Concept</div>
  <div id="info-desc"></div>
</div>

<svg id="universe"></svg>

<script>
// ── 核心架构：主数据(Master) vs 激活层(Activated) vs 渲染层(Visible) ─────────
const width = window.innerWidth;
const height = window.innerHeight;

let masterNodes = [];    
let masterLinks = [];    
let visibleNodes = [];   
let visibleLinks = [];   

let activatedNodeIds = new Set();
let nodeTypesVisible = { concept: true, section: true };

let edgeColors = {}; 
let nodeDegree = {};
let selectedNodeId = null;
let activeFilters = new Set();
const INITIAL_NODES_COUNT = 60; 

const svg = d3.select("#universe").attr("viewBox", [0, 0, width, height]);
const container = svg.append("g");
let linkGroup, nodeGroup, simulation;

const bgStars = svg.insert("g", ":first-child").attr("class", "bg-stars");
for(let i=0; i<200; i++) {
  bgStars.append("circle")
    .attr("cx", Math.random() * width).attr("cy", Math.random() * height)
    .attr("r", Math.random() * 1.5).attr("fill", "#fff").attr("opacity", Math.random() * 0.6 + 0.1);
}

const zoom = d3.zoom().scaleExtent([0.05, 5]).on("zoom", e => {
  container.attr("transform", e.transform);
  bgStars.attr("transform", `translate(${e.transform.x * 0.1}, ${e.transform.y * 0.1}) scale(${1 + (e.transform.k - 1)*0.1})`);
});
svg.call(zoom);

// ── 1. 文件加载与解析 ──────────────────────────────────────────────────
document.getElementById('file-upload').addEventListener('change', function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const label = document.querySelector('.custom-file-upload');
  label.innerHTML = "CALCULATING GRAVITY...";
  label.style.pointerEvents = "none";

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      document.getElementById("start-screen").style.opacity = "0";
      setTimeout(() => {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("hud-panel").style.display = "block";
        document.getElementById("search-container").style.display = "block";
        processData(data);
      }, 500);
    } catch (err) {
      alert("Error parsing JSON: " + err.message);
      label.innerHTML = "LOAD GRAPH.JSON";
      label.style.pointerEvents = "auto";
    }
  };
  reader.readAsText(file);
});

// ── 2. 数据处理与提取主数据 ──────────────────────────────────────────────
function processData(data) {
  const rawNodes = data.nodes || [];
  rawNodes.forEach(n => n.isSection = n.type === 'section'); 
  const nodeIds = new Set(rawNodes.map(n => n.id));

  const rawLinks = data.links || data.edges || [];
  const validLinksData = rawLinks.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));

  validLinksData.forEach(l => {
    let eType = l.edge_type || "UNKNOWN";
    l.type = eType;
    if (!edgeColors[eType]) edgeColors[eType] = l.color || "#00f0ff"; 
  });

  rawNodes.forEach(n => nodeDegree[n.id] = 0);
  validLinksData.forEach(l => {
    nodeDegree[l.source]++;
    nodeDegree[l.target]++;
  });

  masterNodes = rawNodes.map(d => {
    let degree = nodeDegree[d.id] || 0;
    return {
      ...d, 
      label: d.short_label || d.label || d.id,
      desc: d.tooltip || d.desc || "No description.",
      radius: d.isSection ? Math.max(15, Math.min(40, 10 + degree * 0.5)) : Math.max(2, Math.min(15, 2 + degree * 0.8)), 
      haloColor: d.isSection ? "#1a2333" : (degree > 8 ? "#00f0ff" : (degree > 3 ? "#b026ff" : "#58a6ff"))
    };
  });
  
  masterLinks = validLinksData.map(d => ({ ...d }));

  // 【性能优化】初始核心节点散布：避免都在屏幕最中心生成，降低物理重叠
  const sortedNodes = [...masterNodes].sort((a, b) => nodeDegree[b.id] - nodeDegree[a.id]);
  sortedNodes.slice(0, INITIAL_NODES_COUNT).forEach(n => {
    n.x = width / 2 + (Math.random() - 0.5) * width * 0.5;
    n.y = height / 2 + (Math.random() - 0.5) * height * 0.5;
    activatedNodeIds.add(n.id);
  });

  initUniverseEngine();
}

// ── 3. 核心过滤逻辑：刷新可视数据集合 ────────────────────────────────────
function refreshVisibleData() {
  visibleNodes = masterNodes.filter(n => {
    if (!activatedNodeIds.has(n.id)) return false;
    if (n.isSection && !nodeTypesVisible.section) return false;
    if (!n.isSection && !nodeTypesVisible.concept) return false;
    return true;
  });

  const vIds = new Set(visibleNodes.map(n => n.id));

  visibleLinks = masterLinks
    .filter(l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return vIds.has(sid) && vIds.has(tid);
    })
    .map(l => ({...l})); 

  updateUniverseRender();
}

// ── 4. 初始化物理引擎架构与 UI ──────────────────────────────────────────
function initUniverseEngine() {
  const defs = svg.append("defs");

  Object.entries(edgeColors).forEach(([type, color]) => {
    let safeId = "glow-" + btoa(unescape(encodeURIComponent(type))).replace(/[^a-zA-Z0-9]/g, '');
    const filter = defs.append("filter").attr("id", safeId).attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
    filter.append("feGaussianBlur").attr("stdDeviation", "2").attr("result", "blur1");
    filter.append("feGaussianBlur").attr("stdDeviation", "6").attr("result", "blur2").attr("in", "SourceGraphic");
    const feMerge = filter.append("feMerge");
    feMerge.append("feMergeNode").attr("in", "blur2"); 
    feMerge.append("feMergeNode").attr("in", "blur1"); 
    feMerge.append("feMergeNode").attr("in", "SourceGraphic");
  });

  const starFilter = defs.append("filter").attr("id", "star-glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
  starFilter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "blur");
  const starMerge = starFilter.append("feMerge");
  starMerge.append("feMergeNode").attr("in", "blur");
  starMerge.append("feMergeNode").attr("in", "SourceGraphic");

  linkGroup = container.append("g").attr("class", "links");
  nodeGroup = container.append("g").attr("class", "nodes");

  simulation = d3.forceSimulation()
    .force("link", d3.forceLink().id(d => d.id).distance(150)) 
    .force("charge", d3.forceManyBody().strength(d => d.isSection ? -600 : -250)) 
    .force("center", d3.forceCenter(width / 2, height / 2).strength(0.05))
    .force("collide", d3.forceCollide().radius(d => d.radius + 15))
    .velocityDecay(0.4) // 【性能优化】增加阻尼，让大批节点加载时的摩擦力变大，减缓爆炸乱飞
    .alphaDecay(0.01);

  simulation.on("tick", () => {
    linkGroup.selectAll(".link-group").selectAll("line")
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeGroup.selectAll(".node").attr("transform", d => `translate(${d.x}, ${d.y})`);
  });

  // ── 【修复】新增：实体类型过滤状态管理器，保持焦点 ──
  const handleEntityFilterChange = () => {
    if (selectedNodeId) {
      const node = masterNodes.find(n => n.id === selectedNodeId);
      const isVisible = node.isSection ? nodeTypesVisible.section : nodeTypesVisible.concept;
      
      if (isVisible) {
        // 如果当前选中的节点依然属于可见类别，重新聚焦它（刷新周围的边）
        expandAndFocusNode(selectedNodeId);
      } else {
        // 只有当选中的节点类别被关掉时，才释放它
        resetUniverse();
        refreshVisibleData();
      }
    } else {
      refreshVisibleData();
    }
  };

  // 绑定实体节点显示隐藏开关
  document.getElementById('toggle-concepts').addEventListener('change', (e) => {
    nodeTypesVisible.concept = e.target.checked;
    handleEntityFilterChange();
  });
  
  document.getElementById('toggle-sections').addEventListener('change', (e) => {
    nodeTypesVisible.section = e.target.checked;
    handleEntityFilterChange();
  });

  // 绑定加载全图按钮
  document.getElementById('btn-load-all').addEventListener('click', function() {
    masterNodes.forEach(n => {
      if (!activatedNodeIds.has(n.id)) {
        // 【性能优化核心】在广阔的三倍屏幕空间中随机散布节点，彻底杜绝所有节点重叠带来的"闪白爆炸"
        n.x = (Math.random() - 0.5) * width * 3;
        n.y = (Math.random() - 0.5) * height * 3;
        activatedNodeIds.add(n.id);
      }
    });
    this.innerText = "ALL SYSTEMS ONLINE";
    this.disabled = true;
    
    // 【修复】全加载时也保持当前焦点
    if (selectedNodeId) {
      expandAndFocusNode(selectedNodeId);
    } else {
      refreshVisibleData();
    }
  });

  // 渲染连线类型过滤器 UI
  const filterContainer = document.getElementById("filter-container");
  filterContainer.innerHTML = ''; 
  Object.entries(edgeColors).forEach(([type, color]) => {
    activeFilters.add(type);
    const row = document.createElement("label");
    row.className = "filter-row";
    row.innerHTML = `<input type="checkbox" style="margin-right:10px; accent-color:${color}" value="${type}" checked>
                     <div class="filter-color" style="background:${color}; box-shadow: 0 0 10px ${color}"></div>
                     <span>${type.replace(/_/g, ' ')}</span>`;
    filterContainer.appendChild(row);
    row.querySelector("input").addEventListener("change", (e) => {
      if (e.target.checked) activeFilters.add(type); else activeFilters.delete(type);
      if(selectedNodeId) expandAndFocusNode(selectedNodeId); else refreshVisibleData();
    });
  });

  // ── 智能搜索算法 ──
  const searchInput = document.getElementById("search-input");
  const dropdown = document.getElementById("dropdown");
  const newSearchInput = searchInput.cloneNode(true);
  searchInput.parentNode.replaceChild(newSearchInput, searchInput);

  newSearchInput.addEventListener("input", function() {
    const val = this.value.toLowerCase().trim();
    dropdown.innerHTML = "";
    if (!val) { dropdown.style.display = "none"; return; }
    
    const valSingular = (val.endsWith('s') && val.length > 3) ? val.slice(0, -1) : val;
    const searchTerms = val.split(' ').filter(t => t.length > 0);

    let scoredMatches = masterNodes.map(n => {
      const label = (n.label || "").toLowerCase();
      let score = 0;
      
      if (label === val) { score = 1000; }
      else if (label.startsWith(val)) { score = 800; }
      else if (label.includes(val)) { score = 500; }
      else if (valSingular !== val && label.includes(valSingular)) { score = 300; }
      else if (searchTerms.length > 1 && searchTerms.every(t => label.includes(t))) { score = 100; }

      if (score > 0) score += (nodeDegree[n.id] || 0) * 0.5;
      return { node: n, score: score };
    });

    const matches = scoredMatches.filter(item => item.score > 0).sort((a, b) => b.score - a.score).map(item => item.node);

    if (matches.length > 0) {
      dropdown.style.display = "block";
      matches.slice(0, 15).forEach(match => {
        const item = document.createElement("div");
        item.className = "dropdown-item";
        const mass = nodeDegree[match.id] || 0;
        item.innerHTML = `<span>${match.label}</span> <span class="item-mass">Mass: ${mass}</span>`;
        item.onclick = () => {
          newSearchInput.value = match.label;
          dropdown.style.display = "none";
          expandAndFocusNode(match.id); 
        };
        dropdown.appendChild(item);
      });
    } else {
      dropdown.style.display = "none";
    }
  });

  svg.on("click", (e) => {
    if (e.target.tagName === 'svg' && selectedNodeId) resetUniverse();
  });

  refreshVisibleData();
}

// ── 5. 数据渲染 D3 Pipeline ───────────────────────────────────────────────
function updateUniverseRender() {
  document.getElementById("universe-stats").innerText = `Explored: ${activatedNodeIds.size} / Total: ${masterNodes.length}`;

  const linkElements = linkGroup.selectAll(".link-group")
    .data(visibleLinks, d => {
      const sid = d.source.id || d.source;
      const tid = d.target.id || d.target;
      return sid + "-" + tid;
    })
    .join(
      enter => {
        const g = enter.append("g")
          .attr("class", "link-group")
          .attr("id", d => `link-${d.source.id || d.source}-${d.target.id || d.target}`);
        
        g.append("line").attr("class", "link-base")
         .attr("stroke", d => edgeColors[d.type]).attr("stroke-width", 1.5)
         .attr("filter", d => `url(#glow-${btoa(unescape(encodeURIComponent(d.type))).replace(/[^a-zA-Z0-9]/g, '')})`);
        
        g.append("line").attr("class", "link-particles")
         .attr("stroke", "#ffffff").attr("stroke-width", 1.5)
         .attr("filter", d => `url(#glow-${btoa(unescape(encodeURIComponent(d.type))).replace(/[^a-zA-Z0-9]/g, '')})`);
        
        return g;
      },
      update => update,
      exit => exit.remove() 
    );

  const nodeElements = nodeGroup.selectAll(".node")
    .data(visibleNodes, d => d.id)
    .join(
      enter => {
        const g = enter.append("g").attr("class", "node")
          .call(drag(simulation))
          .on("click", (event, d) => expandAndFocusNode(d.id))
          .on("mouseover", handleMouseOver)
          .on("mouseout", handleMouseOut);

        g.filter(d => !d.isSection).append("path").attr("class", "star-flare")
         .attr("d", d => { const s = d.radius * 2.5; return `M-${s},0 L${s},0 M0,-${s} L0,${s}`; })
         .attr("filter", "url(#star-glow)");

        g.append("circle").attr("class", d => d.isSection ? "nebula-halo" : "star-halo")
         .attr("r", d => d.isSection ? d.radius * 1.5 : d.radius + 3)
         .attr("fill", d => d.isSection ? "#1f6feb" : d.haloColor)
         .attr("filter", d => d.isSection ? "" : "url(#star-glow)");

        g.append("circle").attr("class", d => d.isSection ? "nebula-core" : "star-core")
         .attr("r", d => d.radius);

        g.append("text").attr("dx", d => d.radius + 12).attr("dy", 4)
         .style("fill", d => d.isSection ? "#58a6ff" : "#c9d1d9")
         .style("text-transform", d => d.isSection ? "uppercase" : "none")
         .style("letter-spacing", d => d.isSection ? "2px" : "1px")
         .text(d => d.label);

        return g;
      },
      update => update,
      exit => exit.remove() 
    );

  simulation.nodes(visibleNodes);
  simulation.force("link").links(visibleLinks);
  
  // 【性能优化】降低 Alpha 能量注入值。避免新节点加载时速度太快引起帧率暴跌。
  simulation.alpha(0.15).restart(); 
}

// ── 6. 探索式加载逻辑 (与重构后的 Activated 记录结合) ──────────────────────
function expandAndFocusNode(nodeId) {
  if (selectedNodeId && selectedNodeId !== nodeId) {
    const oldNode = masterNodes.find(n => n.id === selectedNodeId);
    if (oldNode) { oldNode.fx = null; oldNode.fy = null; }
  }

  selectedNodeId = nodeId;
  const targetMasterNode = masterNodes.find(n => n.id === nodeId);
  
  if (!activatedNodeIds.has(nodeId)) {
    targetMasterNode.x = width/2; targetMasterNode.y = height/2; 
    activatedNodeIds.add(nodeId);
  }

  const neighborIds = new Set();
  const linksToAdd = [];
  
  masterLinks.forEach(l => {
    let sid = l.source.id || l.source;
    let tid = l.target.id || l.target;
    if (activeFilters.has(l.type)) {
      if (sid === nodeId) { neighborIds.add(tid); linksToAdd.push(l); }
      if (tid === nodeId) { neighborIds.add(sid); linksToAdd.push(l); }
    }
  });

  neighborIds.forEach(nid => {
    if (!activatedNodeIds.has(nid)) {
      const newNode = masterNodes.find(n => n.id === nid);
      if (targetMasterNode.x) {
        // 【性能优化核心】召唤的邻居不要重叠！在一个大半径环形轨道上生成它们
        const radius = 50 + Math.random() * 200;
        const angle = Math.random() * Math.PI * 2;
        newNode.x = targetMasterNode.x + Math.cos(angle) * radius;
        newNode.y = targetMasterNode.y + Math.sin(angle) * radius;
      }
      activatedNodeIds.add(nid);
    }
  });

  refreshVisibleData();

  targetMasterNode.fx = targetMasterNode.x || width / 2;
  targetMasterNode.fy = targetMasterNode.y || height / 2;

  const connectedEdgeIds = new Set(linksToAdd.map(l => `link-${l.source.id || l.source}-${l.target.id || l.target}`));
  
  const nodeElements = d3.selectAll(".node");
  const linkElements = d3.selectAll(".link-group");

  nodeElements.classed("dimmed", d => d.id !== nodeId && !neighborIds.has(d.id));
  nodeElements.classed("active", d => d.id === nodeId);
  nodeElements.classed("neighbor", d => neighborIds.has(d.id));

  linkElements.classed("active", false);
  linkElements.filter(function() { return connectedEdgeIds.has(d3.select(this).attr("id")); }).classed("active", true);

  const infoPanel = document.getElementById("info-panel");
  document.getElementById("info-title").innerText = targetMasterNode.label;
  document.getElementById("info-desc").innerHTML = `<span style="color:#58a6ff">System Mass: ${nodeDegree[targetMasterNode.id]}</span><br><br>${targetMasterNode.desc}`;
  infoPanel.classList.add("show");

  const targetX = targetMasterNode.x || width / 2;
  const targetY = targetMasterNode.y || height / 2;

  svg.transition().duration(1000).call(
    zoom.transform, 
    d3.zoomIdentity.translate(width / 2, height / 2).scale(1.2).translate(-targetX, -targetY)
  );
}

// ── 交互辅助函数 ────────────────────────────────────────────────────────
function handleMouseOver(event, d) {
  if (selectedNodeId && selectedNodeId !== d.id) return;
  d3.select(this).select(".star-halo, .nebula-halo").attr("r", d.isSection ? d.radius * 1.8 : d.radius + 6);
}
function handleMouseOut(event, d) {
  if (selectedNodeId) return;
  d3.select(this).select(".star-halo, .nebula-halo").attr("r", d.isSection ? d.radius * 1.5 : d.radius + 3);
}
function resetUniverse() {
  if (selectedNodeId) {
    const oldNode = masterNodes.find(n => n.id === selectedNodeId);
    if (oldNode) { oldNode.fx = null; oldNode.fy = null; }
  }
  selectedNodeId = null;
  document.getElementById("info-panel").classList.remove("show");
  d3.selectAll(".node").classed("dimmed", false).classed("active", false).classed("neighbor", false);
  d3.selectAll(".star-halo, .nebula-halo").attr("r", d => d.isSection ? d.radius * 1.5 : d.radius + 3);
  d3.selectAll(".link-group").classed("active", false);
}
function drag(sim) {
  return d3.drag()
    .on("start", (event, d) => { if (!event.active) sim.alphaTarget(0.1).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on("end", (event, d) => { 
      if (!event.active) sim.alphaTarget(0); 
      if (d.id !== selectedNodeId) { d.fx = null; d.fy = null; }
    });
}
</script>
